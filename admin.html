<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="admin">

    <h1>🌾 Painel Administrativo</h1>

    <div class="admin-menu" role="navigation">

        <button type="button" onclick="mostrarSecao('cadastro-produtor')">
            Cadastrar Produtor
        </button>

        <button type="button" onclick="mostrarSecao('produtores-cadastrados')">
            Ver Produtores
        </button>

        <button type="button" onclick="mostrarSecao('editar-feira')">
            Informações da Feira
        </button>

        <button type="button" onclick="mostrarSecao('avisos')">
            Avisos
        </button>

        <button type="button" onclick="mostrarSecao('receitas-admin')">
            Receitas
        </button>

    </div>

    <!-- CADASTRAR PRODUTOR -->

    <div id="cadastro-produtor" class="admin-section">

        <h2>Cadastrar Produtor</h2>

        <form id="form-produtor">

            <input type="text"
                   id="nome"
                   placeholder="Nome do produtor"
                   required>

            <input type="text"
                   id="historia"
                   placeholder="História do produtor"
                   required>

            <input type="text"
                   id="produto"
                   placeholder="Produto vendido"
                   required>

            <input type="text"
                   id="imagem"
                   placeholder="URL da imagem"
                   required>

            <button type="submit">
                Adicionar Produtor
            </button>

        </form>

    </div>

    <!-- VER PRODUTORES -->

    <div id="produtores-cadastrados"
         class="admin-section"
         style="display: none;">

        <h2>Produtores Cadastrados</h2>

        <div id="lista-admin-produtores"></div>

    </div>

    <!-- EDITAR FEIRA -->

    <div id="editar-feira"
         class="admin-section"
         style="display: none;">

        <h2>Informações da Feira</h2>

        <form id="form-feira">

            <input type="text"
                   id="local-feira"
                   placeholder="Local da feira">

            <input type="text"
                   id="data-feira"
                   placeholder="Data da feira">

            <input type="text"
                   id="horario-feira"
                   placeholder="Horário da feira">

            <button type="submit">
                Salvar Informações
            </button>

        </form>

    </div>

    <!-- AVISOS -->

    <div id="avisos"
         class="admin-section"
         style="display: none;">

        <h2>Área de Avisos</h2>

        <form id="form-aviso">

            <input type="text"
                   id="texto-aviso"
                   placeholder="Digite um aviso">

            <button type="submit">
                Publicar Aviso
            </button>

        </form>

        <div id="lista-avisos"></div>

    </div>

    <!-- RECEITAS -->

    <div id="receitas-admin"
         class="admin-section"
         style="display: none;">

        <h2>Adicionar Receita</h2>

        <form id="form-receita">

            <input type="text"
                   id="nome-receita"
                   placeholder="Nome da receita"
                   required>

            <input type="text"
                   id="descricao-receita"
                   placeholder="Descrição da receita"
                   required>

            <input type="text"
                   id="imagem-receita"
                   placeholder="URL da imagem"
                   required>

            <button type="submit">
                Adicionar Receita
            </button>

        </form>

        <div id="lista-receitas-admin"></div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
