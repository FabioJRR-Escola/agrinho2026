<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<section class="admin">

    <h1>🌾 Painel Administrativo</h1>

    <!-- MENU -->

    <div class="admin-menu">

        <button type="button"
                onclick="mostrarSecao('banner-admin')">

            Banner

        </button>

        <button type="button"
                onclick="mostrarSecao('cadastro-produtor')">

            Cadastrar Produtor

        </button>

        <button type="button"
                onclick="mostrarSecao('produtores-cadastrados')">

            Ver Produtores

        </button>

        <button type="button"
                onclick="mostrarSecao('editar-feira')">

            Informações da Feira

        </button>

        <button type="button"
                onclick="mostrarSecao('avisos-admin')">

            Avisos

        </button>

        <button type="button"
                onclick="mostrarSecao('receitas-admin')">

            Receitas

        </button>

    </div>

    <!-- =========================================
    BANNER
    ========================================= -->

    <div id="banner-admin"
         class="admin-section">

        <h2>Editar Banner</h2>

        <form id="form-banner">

            <input type="text"
                   id="banner-titulo"
                   placeholder="Título do banner">

            <input type="text"
                   id="banner-subtitulo"
                   placeholder="Subtítulo do banner">

            <input type="text"
                   id="banner-logo-input"
                   placeholder="URL da logo">

            <input type="text"
                   id="banner-imagem"
                   placeholder="URL da imagem do banner">

            <button type="submit">

                Salvar Banner

            </button>

        </form>

    </div>

    <!-- =========================================
    CADASTRAR PRODUTOR
    ========================================= -->

    <div id="cadastro-produtor"
         class="admin-section"
         style="display:none;">

        <h2>Cadastrar Produtor</h2>

        <form id="form-produtor">

            <input type="text"
                   id="nome"
                   placeholder="Nome do produtor"
                   required>

            <input type="text"
                   id="historia"
                   placeholder="História do produtor"
                   required>

            <input type="text"
                   id="produto"
                   placeholder="Produto vendido"
                   required>

            <input type="text"
                   id="imagem"
                   placeholder="URL da imagem"
                   required>

            <button type="submit">

                Adicionar Produtor

            </button>

        </form>

    </div>

    <!-- =========================================
    PRODUTORES CADASTRADOS
    ========================================= -->

    <div id="produtores-cadastrados"
         class="admin-section"
         style="display:none;">

        <h2>Produtores Cadastrados</h2>

        <div id="lista-admin-produtores"></div>

    </div>

    <!-- =========================================
    FEIRA
    ========================================= -->

    <div id="editar-feira"
         class="admin-section"
         style="display:none;">

        <h2>Informações da Feira</h2>

        <form id="form-feira">

            <input type="text"
                   id="local-feira"
                   placeholder="Local da feira">

            <input type="text"
                   id="data-feira"
                   placeholder="Data">

            <input type="text"
                   id="horario-feira"
                   placeholder="Horário">

            <button type="submit">

                Salvar Informações

            </button>

            <button type="button"
                    onclick="removerFeira()"
                    class="remove-btn">

                Remover Informações

            </button>

        </form>

    </div>

    <!-- =========================================
    AVISOS
    ========================================= -->

    <div id="avisos-admin"
         class="admin-section"
         style="display:none;">

        <h2>Avisos</h2>

        <form id="form-aviso">

            <input type="text"
                   id="texto-aviso"
                   placeholder="Digite um aviso">

            <input type="text"
                   id="tempo-aviso"
                   placeholder="Ex: Há 2 horas">

            <button type="submit">

                Publicar Aviso

            </button>

        </form>

        <br>

        <div id="lista-avisos-admin"></div>

    </div>

    <!-- =========================================
    RECEITAS
    ========================================= -->

    <div id="receitas-admin"
         class="admin-section"
         style="display:none;">

        <h2>Receitas</h2>

        <form id="form-receita">

            <input type="text"
                   id="nome-receita"
                   placeholder="Nome da receita">

            <input type="text"
                   id="descricao-receita"
                   placeholder="Descrição">

            <input type="text"
                   id="imagem-receita"
                   placeholder="URL da imagem">

            <button type="submit">

                Adicionar Receita

            </button>

        </form>

        <br>

        <div id="lista-receitas-admin"></div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
